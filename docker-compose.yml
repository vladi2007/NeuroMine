services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "6000:6000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - neuromine-net

  client:
    build: ./client
    container_name: client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - neuromine-net

networks:
  neuromine-net:
    driver: bridge