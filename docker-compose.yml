version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "6000"
    networks:
      - neuromine-net

  client:
    build: ./client
    container_name: client
    expose:
      - "5173"
    networks:
      - neuromine-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - client
      - backend
    networks:
      - neuromine-net

networks:
  neuromine-net:
    driver: bridge