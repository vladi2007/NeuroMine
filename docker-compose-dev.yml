version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "6000:6000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: password
      DATABASE_NAME: mydb
      VK_SECRET: ${VK_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - neuromine-net
  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: ${VITE_API_URL}

      
    
    command: yarn dev --host
    networks:
      - neuromine-net
  mysql:
    image: mysql:latest

    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3306:3306"

    volumes:
      - mysql_dev_data:/var/lib/mysql

    networks:
      - neuromine-net
volumes:
  mysql_dev_data:
networks:
  neuromine-net:
    driver: bridge