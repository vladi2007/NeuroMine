events {}

http {
  server {
    listen 80;

    # React frontend
    location / {
      proxy_pass http://client:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # API backend
    location /api/ {
      proxy_pass http://backend:6000/;
    }
  }
}